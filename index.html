<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" href="style.css">
<position: center>
    <title>TTGo</title>
</head>
<body>
    <h1>TTGo</h1>
    <input type="text" id="msgFredi" placeholder="Type here ...">
    <button onclick="senddataFredi()">Send to Fredi</button>

    <input type="text" id="msgSvea" placeholder="Type here ...">
    <button onclick="senddataSvea()">Send to Svea</button>

</body>
<script>
    function senddataFredi() {
        let data = document.getElementById("msgFredi");
        let inputdata = data.value;
        fetch("https://ttgo-text-remote-default-rtdb.europe-west1.firebasedatabase.app/msgToSvea.json", {
            method: "PUT",
            body: JSON.stringify(inputdata),
        });
    }
    function senddataSvea() {
        let data = document.getElementById("msgSvea");
        let inputdata = data.value;
        fetch("https://ttgo-text-remote-default-rtdb.europe-west1.firebasedatabase.app/msgToFredi.json", {
            method: "PUT",
            body: JSON.stringify(inputdata),
        });
    }
</script>
</html>
